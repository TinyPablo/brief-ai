<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>Brief AI</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: '#0a0a0c',
            panel: '#131318',
            panel2: '#1a1a20',
            edge: '#26262e',
            muted: '#8a8a95',
            accent: '#7c6cf0',
            accent2: '#9b8ff5',
          },
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
          },
        },
      },
    };
  </script>

  <style>
    html, body { background: #0a0a0c; }
    ::selection { background: rgba(124, 108, 240, 0.35); }

    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a33; border-radius: 6px; border: 2px solid #0a0a0c; }
    ::-webkit-scrollbar-thumb:hover { background: #3a3a45; }

    .pin-input {
      caret-color: #7c6cf0;
    }
    .pin-input:focus {
      border-color: #7c6cf0;
      box-shadow: 0 0 0 3px rgba(124, 108, 240, 0.18);
    }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.15);
      border-top-color: #9b8ff5;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .fade-in { animation: fade 0.25s ease-out; }
    @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

    /* Rendered markdown */
    .md { line-height: 1.7; color: #e6e6ec; font-size: 0.95rem; word-wrap: break-word; }
    .md > *:first-child { margin-top: 0; }
    .md > *:last-child { margin-bottom: 0; }
    .md h1, .md h2, .md h3, .md h4 { font-weight: 600; line-height: 1.3; margin: 1.3em 0 0.5em; }
    .md h1 { font-size: 1.5rem; } .md h2 { font-size: 1.25rem; } .md h3 { font-size: 1.1rem; }
    .md p { margin: 0.7em 0; }
    .md ul, .md ol { margin: 0.7em 0; padding-left: 1.4em; }
    .md ul { list-style: disc; } .md ol { list-style: decimal; }
    .md li { margin: 0.25em 0; }
    .md a { color: #a5a0f5; text-decoration: underline; text-underline-offset: 2px; }
    .md strong { color: #f2f2f6; font-weight: 600; }
    .md code { font-family: 'JetBrains Mono', monospace; font-size: 0.85em; background: #23232b; padding: 0.15em 0.4em; border-radius: 0.35em; }
    .md pre { background: #0e0e12 !important; border: 1px solid #26262e; border-radius: 0.6rem; padding: 1rem; overflow: auto; margin: 0.85em 0; }
    .md pre code { background: none !important; padding: 0; font-size: 0.83rem; line-height: 1.55; }
    .md blockquote { border-left: 3px solid #3a3a44; padding-left: 1em; color: #a4a4ae; margin: 0.7em 0; }
    .md table { border-collapse: collapse; width: 100%; margin: 0.8em 0; font-size: 0.9rem; }
    .md th, .md td { border: 1px solid #26262e; padding: 0.45em 0.75em; text-align: left; }
    .md th { background: #17171d; }
    .md hr { border: none; border-top: 1px solid #26262e; margin: 1.2em 0; }
    .md .katex { font-size: 1.05em; }
    .md .katex-display { overflow-x: auto; overflow-y: hidden; padding: 0.2em 0; margin: 0.8em 0; }

    .md pre { position: relative; }
    .copy-btn {
      position: absolute; top: 8px; right: 8px;
      font-size: 11px; line-height: 1; padding: 4px 8px;
      color: #9a9aa4; background: #1b1b22; border: 1px solid #2c2c35;
      border-radius: 6px; cursor: pointer; opacity: 0;
      transition: opacity 0.15s, color 0.15s, border-color 0.15s;
    }
    .md pre:hover .copy-btn, .copy-btn:focus { opacity: 1; }
    .copy-btn:hover { color: #fff; border-color: #3a3a45; }
  </style>
</head>
<body class="font-sans text-[#e6e6ec] antialiased">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked-katex-extension@5.1.4/lib/index.umd.js"></script>

  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
